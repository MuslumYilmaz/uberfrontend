<div class="essential-wrap">
  <header class="fa-page-header essential-header">
    <div class="essential-header__copy">
      <p class="fa-page-kicker">Curated shortlist</p>
      <h1 class="fa-page-title">{{ data.collection.title }}</h1>
      <p class="fa-page-subtitle">
        {{ data.collection.description }}
      </p>
    </div>
    <div class="essential-header__stats" aria-label="Essential question stats">
      <div class="essential-stat">
        <span class="essential-stat__value">{{ data.items.length }}</span>
        <span class="essential-stat__label">total</span>
      </div>
      <div class="essential-stat">
        <span class="essential-stat__value">{{ mustKnowCount() }}</span>
        <span class="essential-stat__label">must know</span>
      </div>
      <div class="essential-stat">
        <span class="essential-stat__value">{{ premiumCount() }}</span>
        <span class="essential-stat__label">premium</span>
      </div>
    </div>
  </header>

  <section class="essential-support" aria-label="Essential routes">
    <a class="essential-support__link" routerLink="/interview-questions">
      Guided warm-up
    </a>
    <a class="essential-support__link" routerLink="/coding" [queryParams]="{ reset: 1 }">
      Open Question Library
    </a>
  </section>

  <section class="essential-toolbar" aria-label="Essential filters">
    <div class="essential-toolbar__group">
      <span class="essential-toolbar__label">Sections</span>
      <div class="essential-chip-row">
        <button
          *ngFor="let option of sectionOptions"
          type="button"
          class="essential-chip"
          [class.is-active]="section() === option.key"
          [attr.data-testid]="'essential-section-' + option.key"
          (click)="selectSection(option.key)"
        >
          <span>{{ option.label }}</span>
          <span class="essential-chip__count">{{ sectionCount(option.key) }}</span>
        </button>
      </div>
    </div>

    <div class="essential-toolbar__group">
      <span class="essential-toolbar__label">Tiers</span>
      <div class="essential-chip-row">
        <button
          *ngFor="let option of tierOptions"
          type="button"
          class="essential-chip"
          [class.is-active]="tier() === option.key"
          [attr.data-testid]="'essential-tier-' + option.key"
          (click)="selectTier(option.key)"
        >
          {{ option.label }}
        </button>
      </div>
    </div>
  </section>

  <section class="essential-list" aria-label="Essential question list">
    <fa-question-row
      *ngFor="let item of filteredItems()"
      [testId]="'essential-row-' + item.id"
      [kindLabel]="'#' + item.rank"
      [title]="item.title"
      [description]="item.shortDescription"
      [descriptionTooltip]="descriptionTooltip(item)"
      [routerLink]="item.route"
      [solved]="isSolved(item)"
      [companies]="item.companies"
      [metaChips]="rowMetaChips(item)"
      [variants]="rowVariants(item)"
      (variantSelected)="openVariant($event, item)"
    ></fa-question-row>
  </section>

</div>

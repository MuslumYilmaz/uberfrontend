name: SEO Prerender Sitemap Guard

on:
  pull_request:

jobs:
  prerender-sitemap-guard:
    name: SEO Prerender Guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run SEO prerender guard
        run: npm run verify:seo-prerender-guard

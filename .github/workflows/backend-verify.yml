name: Backend Verify

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-verify:
    name: Backend Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend verify suite
        run: npm run verify:ci

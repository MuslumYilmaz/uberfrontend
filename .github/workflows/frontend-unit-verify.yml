name: Frontend Unit Verify

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend-unit-verify:
    name: Frontend Unit Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend unit and content verification
        run: npm run verify:unit-and-content
